services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: figgie
      POSTGRES_PASSWORD: figgie
      POSTGRES_DB: figgie
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U figgie"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
